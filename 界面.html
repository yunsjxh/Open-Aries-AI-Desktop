        }
        // Strip the AI's narration of tool calls from text (e.g. "✓ UNINSTALL_APP → Stellaris")
        // since the inline tool part already displays this info. Match anywhere in text.
        function stripToolNarration(text) {
            if (!text) return text;
            return text
                // 1) Inline tool narration with arrow: "✓ UNINSTALL_APP → Stellaris"
                .replace(/\b[✓✗]?\s*[A-Z][A-Z0-9_]{1,}\s*→[ \t]*[^\n]*/g, '')
                // 2) "工具执行结果 (UNINSTALL_APP):\n..." chunks the AI may re-quote from history
                .replace(/工具执行结果\s*\([^)]+\)\s*:[\s\S]*?(?=\n\n|\n[^\n]|$)/g, '')
                // 3) "工具调用：UNINSTALL_APP ..." or "调用工具 UNINSTALL_APP ..."
                .replace(/(?:调用|使用|执行|进行|接下来|让我)?\s*工具[：:]?\s*[A-Z][A-Z0-9_]{1,}[^\n]*/g, '')
                // 4) "我/让我 卸载 Stellaris 应用" / "我先 ..."  (less aggressive)
                .replace(/^\s*(我|让我|先|接下来|下面|现在)[，,。.：:]?\s*(卸载|读取|写入|打开|关闭|删除|移动|复制|列出|检查|查看|运行|执行)\s*[^\n]*\n?/gm, '')
                .replace(/[ \t]+$/gm, '')
                .replace(/\n{3,}/g, '\n\n');
        }
        function pushTextPart(text) {
            const m = ensureAgentMsg();
            const cleaned = stripToolNarration(text);
            _mdDebug.push({step:'pushTextPart', raw:text, cleaned:cleaned, partsCount:m.parts.length});
            if (!cleaned) {
                // If the raw chunk was pure whitespace (e.g. a lone \n), preserve
                // one newline so paragraphs don't fuse together.
                if (text && /^\s+$/.test(text)) {
                    const lastPart = m.parts[m.parts.length - 1];
                    if (lastPart && lastPart.type === 'text') {
                        // Avoid stacking multiple consecutive newlines
                        if (!lastPart.text.endsWith('\n')) {
                            lastPart.text += '\n';
                            _mdDebug.push({step:'pushTextPart-whitespace', appended:'\\n', result:lastPart.text});
                        } else {
                            _mdDebug.push({step:'pushTextPart-whitespace-skipped', reason:'already ends with newline'});
                        }
                    } else {
                        m.parts.push({ type: 'text', text: '\n' });
                    }
                }
                return m;
            }
            const lastPart = m.parts[m.parts.length - 1];
            if (lastPart && lastPart.type === 'text') {
                lastPart.text += cleaned;
            } else {
                m.parts.push({ type: 'text', text: cleaned });
            }
            return m;
        }
        // Pretty-print a tool call's args. Try to parse JSON; fall back to raw string.
        function describeToolArgs(name, rawArgs) {
            if (!rawArgs) return { primary: '', secondary: '' };
            let obj = null;
            try { obj = JSON.parse(rawArgs); } catch(e) { /* not JSON */ }
            const fmt = (s) => (s || '').toString();
            const trunc = (s, n) => s.length > n ? s.slice(0, n - 1) + '…' : s;
            switch (name) {
                case 'READ_FILE':
                case 'LIST_DIR':
                case 'WRITE_FILE':
                case 'DELETE_FILE':
                case 'MOVE_FILE':
                case 'COPY_FILE':
                    return { primary: fmt(obj && obj.path), secondary: '' };
                case 'UNINSTALL_APP':
                case 'OPEN_APP':
                case 'OPEN_APP_LOCATION':
                case 'KILL_PROCESS':
                case 'LIST_PROCESSES':
                case 'CAPTURE_WINDOW':
                    return { primary: fmt(obj && (obj.name || obj.pid)), secondary: '' };
                case 'RUN_PS':
                    return { primary: trunc(fmt(obj && obj.content), 60), secondary: '' };
                case 'LIST_APPS':
                case 'LIST_WINDOWS':
                case 'GET_FOREGROUND_WINDOW':
                    return { primary: '', secondary: '' };
                default:
                    return { primary: trunc(fmt(rawArgs), 60), secondary: '' };
            }
        }
        function renderPart(part) {
            if (part.type === 'text') {
                const cleaned = stripToolNarration(part.text);
                if (!cleaned) return '';
                var html = '<div class="bubble">' + MdRenderer.render(cleaned) + '</div>';
                _mdDebug.push({step:'renderPart', textLen:part.text.length, cleanedLen:cleaned.length, htmlLen:html.length});
                return html;
            }
            if (part.type === 'tool') {
                const running = part.status === 'pending' || part.status === 'running';
                const error = part.status === 'error';
                const cls = 'tool-inline' + (running ? ' running' : '') + (error ? ' error' : '');
                const icon = running ? '<span class="tpulse"></span>'
                            : error ? '<span class="ti">✗</span>'
                            : '<span class="ti">✓</span>';
                const { primary, secondary } = describeToolArgs(part.name, part.args);
                const tooltip = part.args ? esc(part.args) : '';
                const primaryHtml = primary ? `<span class="ta" title="${tooltip}">${esc(primary)}</span>` : '';
                let html = `<div class="${cls}" title="${tooltip}">${icon}<span class="tn">${esc(part.name)}</span>${primaryHtml}</div>`;
                if (part.output && part.output.length > 0) {
                    html += `<details class="tool-output"><summary>输出</summary><div class="tool-content">${esc(part.output)}</div></details>`;
                }
                return html;
            }
            if (part.type === 'image') {
                return `<div class="tool-inline"><span class="ti">📸</span><span class="tn">${esc(part.name)}</span></div><details class="tool-output" open><summary>输出</summary><div class="tool-content" style="padding:8px;"><img class="tool-image" src="data:image/png;base64,${part.imageBase64}"></div></details>`;
            }
            return '';
        }
        function renderParts(msg) {
            if (!msg.parts) msg.parts = [];
            // Merge consecutive text parts so markdown tables/lists can span across them.
            // (Streaming deltas may create multiple adjacent text parts; marked.js needs
            // the full table in one block to recognise it.)
            var merged = [];
            for (var i = 0; i < msg.parts.length; i++) {
                var p = msg.parts[i];
                if (p.type === 'text') {
                    var last = merged[merged.length - 1];
                    if (last && last.type === 'text') {
                        last.text += p.text;
                    } else {
                        merged.push({ type: 'text', text: p.text });
                    }
                } else {
                    merged.push(p);
                }
            }
            return merged.map(renderPart).join('');
        }

        window.appendStreamMessage = function(msg) {
            const m = pushTextPart(msg.content);
            const el = ensureStreamEl(m);
            const details = el.querySelector('.thinking-block');
            if (details) details.removeAttribute('open');
            const bw = el.querySelector('.bubble-wrap');
            if (bw) bw.innerHTML = renderParts(m);
            saveCurrentMessages();
            const c = document.getElementById('chatContainer');
            c.scrollTop = c.scrollHeight;
        };
        window.appendThinking = function(msgId, text) {
            const last = App.messages[App.messages.length - 1];
            if (last && last.type === 'agent' && last.streaming) {
                if (!last.thinking) last.thinking = '';
                last.thinking += text;
            } else {
                App.messages.push({ id: msgId, type: 'agent', name: 'Open Aries AI', content: '', thinking: text, streaming: true, showActions: true });
            }
            const el = ensureStreamEl({name:'Open Aries AI'});
            let tw = el.querySelector('.thinking-wrap');
            if (tw) {
                if (!tw.querySelector('details')) {
                    tw.innerHTML = `<details class="thinking-block" open><summary>思考过程</summary><div class="thinking-content"></div></details>`;
                }
                const tc = tw.querySelector('.thinking-content');
                const cur = App.messages[App.messages.length - 1];
                if (tc && cur && cur.thinking) tc.textContent = cur.thinking;
            }
            saveCurrentMessages();
            const c = document.getElementById('chatContainer');
            c.scrollTop = c.scrollHeight;
        };
        window.showToolCalling = function(toolName) {
            const { msg } = pushToolPart(toolName);
            const el = ensureStreamEl({name:'Open Aries AI'});
            const bw = el.querySelector('.bubble-wrap');
            if (bw) bw.innerHTML = renderParts(msg);
            saveCurrentMessages();
            const c = document.getElementById('chatContainer');
            c.scrollTop = c.scrollHeight;
        };
        window._pendingToolArgs = '';
        window._argsRafId = 0;
        window.appendToolArgs = function(text) {
            const m = ensureAgentMsg();
            const lastPart = m.parts[m.parts.length - 1];
            if (!lastPart || lastPart.type !== 'tool' || lastPart.status !== 'pending') {
                pushToolPart('tool');
            }
            updateLastTool({ args: ((m.parts[m.parts.length-1]||{}).args||'') + text });
            if (!window._argsRafId) {
                window._argsRafId = requestAnimationFrame(function() {
                    window._argsRafId = 0;
                    const msg = App.messages[App.messages.length - 1];
                    const el = ensureStreamEl({name:'Open Aries AI'});
                    const bw = el.querySelector('.bubble-wrap');
                    if (bw) bw.innerHTML = renderParts(msg);
                    saveCurrentMessages();
                    const c = document.getElementById('chatContainer');
                    c.scrollTop = c.scrollHeight;
                });
            }
        };
        window.addToolBlock = function(toolName, args, result) {
            const m = ensureAgentMsg();
            // Backward compat: 2-arg call had (toolName, result) — keep working
            if (arguments.length === 2) { result = args; args = ''; }
            // Extract base tool name (strip trailing " → xxx" sent by older builds)
            const baseName = String(toolName || '').split('→')[0].trim();
            let part = null;
            for (let i = m.parts.length - 1; i >= 0; i--) {
                if (m.parts[i].type === 'tool' && m.parts[i].name === baseName && (m.parts[i].status === 'pending' || m.parts[i].status === 'running')) {
                    part = m.parts[i]; break;
                }
            }
            if (part) {
                part.status = 'completed';
                part.output = result;
                if (args && !part.args) part.args = args;
            } else {
                m.parts.push({ type: 'tool', name: baseName, args: args || '', status: 'completed', output: result });
            }
            const el = ensureStreamEl({name:'Open Aries AI'});
            const bw = el.querySelector('.bubble-wrap');
            if (bw) bw.innerHTML = renderParts(m);
            saveCurrentMessages();
            const c = document.getElementById('chatContainer');
            c.scrollTop = c.scrollHeight;
        };
        window.addImageBlock = function(name, base64) {
            const m = pushImagePart(name, base64);
            const el = ensureStreamEl({name:'Open Aries AI'});
            const bw = el.querySelector('.bubble-wrap');
            if (bw) bw.innerHTML = renderParts(m);
            saveCurrentMessages();
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        };
        window.updateMessageStatus = function(id, status) {
            const m = App.messages.find(x => x.id === id);
            if (m) { m.status = status; renderMessages(); }
        };
        let _sending = false;
        function setSendState(sending) {
            _sending = sending;
            const btn = document.getElementById('sendBtn');
            const sendIcon = document.getElementById('sendIcon');
            const stopIcon = document.getElementById('stopIcon');
            if (sending) {
                btn.classList.add('btn-stop');
                btn.disabled = false;
                sendIcon.style.display = 'none';
                stopIcon.style.display = '';
            } else {
                btn.classList.remove('btn-stop');
                btn.disabled = !document.getElementById('msgInput').value.trim();
                sendIcon.style.display = '';
                stopIcon.style.display = 'none';
            }
        }
        window.setLoading = function(v) {
            const c = document.getElementById('chatContainer');
            if (v) {
                _streamEl = null;
                setSendState(true);
                c.innerHTML += `<div class="msg-agent fade-in" id="loader"><div class="avatar" style="background:var(--code-bg);"><div style="width:13px;height:13px;border:2px solid var(--code-text);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;"></div></div><div class="body" style="padding-top:6px;"><div class="skeleton" style="width:120px;height:12px;margin-bottom:6px;"></div><div class="skeleton" style="width:180px;height:12px;"></div></div></div>`;
                c.scrollTop = c.scrollHeight;
            } else {
                setSendState(false);
                const last = App.messages[App.messages.length - 1];
                if (last && last.streaming) last.streaming = false;
                finishStream();
                document.getElementById('loader')?.remove();
                saveCurrentMessages();
            }
        };

        window.loadSavedSessions = function(jsonArrayStr, activeId) {
            try {
                var saved = JSON.parse(jsonArrayStr);
                if (!Array.isArray(saved) || saved.length === 0) return;
                for (var i = 0; i < saved.length; i++) {
                    var s = saved[i];
                    var raw = s.messages || [];
                    var msgs = [];
                    var pendingTools = [];  // tool results waiting for an agent message
                    function buildAgentMsg(content) {
                        var parts = [];
                        if (content) parts.push({ type: 'text', text: content });
                        for (var k = 0; k < pendingTools.length; k++) {
                            var t = pendingTools[k];
                            if (t.imageBase64) parts.push({ type: 'image', name: t.name, imageBase64: t.imageBase64 });
                            else parts.push({ type: 'tool', name: t.name, args: '', status: 'completed', output: t.result || '' });
                        }
                        return parts;
                    }
                    for (var j = 0; j < raw.length; j++) {
                        var m = raw[j];
                        var role = m.role;
                        if (role === 'user') {
                            pendingTools = [];
                            msgs.push({ id: 's_' + s.id + '_' + j, type: 'user', content: m.content });
                        } else if (role === 'assistant') {
                            var last2 = msgs[msgs.length - 1];
                            if (last2 && last2.type === 'agent' && last2._placeholder && m.content) {
                                last2.parts.push({ type: 'text', text: m.content });
                                last2._placeholder = false;
                            } else {
                                msgs.push({ id: 's_' + s.id + '_' + j, type: 'agent', name: 'Open Aries AI', parts: buildAgentMsg(m.content), showActions: true });
                            }
                            pendingTools = [];
                        } else if (role === 'system' && m.content.indexOf('工具执行结果') === 0) {
                            var toolMatch = m.content.match(/^工具执行结果 \(([^)]+)\):\n([\s\S]*)/);
                            var toolName = toolMatch ? toolMatch[1] : '?';
                            var toolResult = toolMatch ? toolMatch[2].replace(/\n\n请继续处理[\s\S]*$/, '') : '';
                            var last3 = msgs[msgs.length - 1];
                            if (last3 && last3.type === 'agent' && last3.parts) {
                                last3.parts.push({ type: 'tool', name: toolName, args: '', status: 'completed', output: toolResult });
                            } else {
                                pendingTools.push({ name: toolName, result: toolResult });
                                msgs.push({ id: 's_' + s.id + '_' + j, type: 'agent', name: 'Open Aries AI', parts: buildAgentMsg(''), showActions: true, _placeholder: true });
                            }
                        }
                    }
                    var existing = App.sessions.find(function(x) { return x.id === s.id; });
                    if (existing) {
                        existing.messages = msgs;
                        existing.title_set = true;
                    } else {
                        var title = s.title || '新对话';
                        if (!s.title) {
                            var fu = msgs.find(function(m) { return m.type === 'user'; });
                            if (fu) title = fu.content.substring(0, 20);
                        }
                        App.sessions.unshift({ id: s.id, title: title, messages: msgs, title_set: true });
                    }
                }
                if (activeId) App.activeSessionId = activeId;
                var cur = App.sessions.find(function(x) { return x.id === App.activeSessionId; });
                if (cur) {
                    App.messages = cur.messages.slice();
                } else {
                    App.activeSessionId = null;
                    App.messages = [];
                }
                renderNav();
                renderMessages();
                if (App.activeSessionId) {
                    post('switchSession', { sessionId: App.activeSessionId });
                }
            } catch(e) {}
        };

        // === Init ===
        document.getElementById('msgInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            document.getElementById('sendBtn').disabled = !this.value.trim();
        });
        document.getElementById('msgInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
        });
        // === Window resize via edge handles ===
        (function() {
            var handles = document.querySelectorAll('.resize-handle');
            var edge = '', sx = 0, sy = 0, lastPost = 0;
            handles.forEach(function(h) {
                h.addEventListener('mousedown', function(e) {
                    edge = h.id.replace('rh-', '');
                    sx = e.screenX; sy = e.screenY;
                    e.preventDefault();
                    e.stopPropagation();
                    document.body.style.userSelect = 'none';
                    document.body.style.webkitUserSelect = 'none';
                });
            });
            window.addEventListener('mousemove', function(e) {
                if (!edge) return;
                e.preventDefault();
                var dx = e.screenX - sx, dy = e.screenY - sy;
                if (dx === 0 && dy === 0) return;
                var now = Date.now();
                if (now - lastPost < 30) return;
                lastPost = now;
                post('resize', { edge: edge, dx: dx, dy: dy });
                sx = e.screenX; sy = e.screenY;
            });
            window.addEventListener('mouseup', function() {
                edge = '';
                document.body.style.userSelect = '';
                document.body.style.webkitUserSelect = '';
            });
        })();

        document.getElementById('sendBtn').addEventListener('click', sendMsg);
        document.getElementById('attachBtn').addEventListener('click', () => post('attachFile', {}));

        // Titlebar drag
        document.getElementById('titlebar').addEventListener('mousedown', (e) => {
            if (e.target.closest('.titlebar-btn, .agent-toggle')) return;
            post('dragStart', { x: e.screenX, y: e.screenY });
        });

        document.getElementById('btnMin').addEventListener('click', () => post('windowControl', { action: 'minimize' }));
        document.getElementById('btnMax').addEventListener('click', () => post('windowControl', { action: 'maximize' }));
        document.getElementById('btnClose').addEventListener('click', () => post('windowControl', { action: 'close' }));

        window.addEventListener('DOMContentLoaded', () => post('init', { ready: true }));

        // Random brand font on each load
        (function(){
            var fonts = [
                'Georgia, "Times New Roman", serif',
                '"Palatino Linotype", "Book Antiqua", Palatino, serif',
                '"Garamond", "EB Garamond", serif',
                '"Baskerville", "Libre Baskerville", serif',
                '"Courier New", "Courier Prime", Courier, monospace',
                'Consolas, "Fira Code", "Source Code Pro", monospace',
                '"Lucida Console", "DejaVu Sans Mono", Monaco, monospace',
                '"Comic Sans MS", "Patrick Hand", "Caveat", cursive',
                '"Segoe Script", "Brush Script MT", "Great Vibes", cursive',
                '"Bradley Hand", "Pacifico", "Dancing Script", cursive',
                'Impact, "Arial Black", "Anton", sans-serif',
                '"Franklin Gothic", "Oswald", "League Spartan", sans-serif',
                '"Trebuchet MS", "Lucida Sans", "Open Sans", sans-serif',
                '"Segoe UI", "Inter", system-ui, sans-serif',
                'Verdana, "PT Sans", "Source Sans Pro", sans-serif',
                '"Century Gothic", "Futura", "Montserrat", sans-serif',
                'Tahoma, Arial, "Helvetica Neue", sans-serif',
                '"Gill Sans", "Lato", "Roboto", sans-serif',
                'Optima, "Josefin Sans", "Raleway", sans-serif',
                '"Copperplate", "Playfair Display", serif',
                '"Rockwell", "Arvo", "Alfa Slab One", serif',
                '"American Typewriter", "Special Elite", serif',
                'Didot, "Bodoni Moda", "Cormorant Garamond", serif',
                '"OCR A Std", "Share Tech Mono", monospace',
                '"Lucida Handwriting", "Alex Brush", cursive',
            ];
            var f = fonts[Math.floor(Math.random() * fonts.length)];
            var el = document.getElementById('sidebarBrand');
            if (el) el.style.fontFamily = f;
        })();

        // === Init ===
        App.user = { name: '用户' };
        App.sessions = [];
        App.activeSessionId = null;
        App.messages = [];
        renderUser();
        renderNav();
        renderMessages();
    </script>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box" style="display:flex;flex-direction:row;gap:24px;width:600px;padding:20px 20px 60px 20px;">
            <!-- Left: vertical tabs -->
            <div class="vtabs" style="display:flex;flex-direction:column;gap:2px;flex-shrink:0;width:80px;padding-top:4px;border-right:1px solid var(--border);margin-right:4px;">
                <div class="vtab active" onclick="switchSettingsTab('api')" id="tabApi">API</div>
                <div class="vtab" onclick="switchSettingsTab('mcp')" id="tabMcp">MCP</div>
                <div class="vtab" onclick="switchSettingsTab('appearance')" id="tabAppearance">外观</div>
                <div class="vtabs-indicator" id="vtabIndicator"></div>
            </div>
            <!-- Right: content area (fixed height) -->
            <div style="flex:1;min-width:0;min-height:340px;">
                <!-- API Tab -->
                <div id="tabContentApi">
                    <h3 style="margin-top:0;">API 设置</h3>
                    <label>API 地址</label>
                    <input type="text" id="cfgHost" placeholder="api.siliconflow.cn/v1">
                    <label>API Key</label>
                    <input type="password" id="cfgKey" placeholder="sk-...">
                    <label>模型</label>
                    <input type="text" id="cfgModel" placeholder="Pro/zai-org/GLM-5">
                    <div style="margin-top:12px;">
                        <button class="btn-primary" id="btnTestConn" onclick="testConnection()" style="width:100%;">测试连接</button>
                        <span id="testResult" style="font-size:12px;margin-left:10px;"></span>
                        <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">注：视觉能力检测通过发送 1×1 像素 PNG 探测，每次约消耗 100~150 tokens。</div>
                    </div>
                </div>
                <!-- MCP Tab -->
                <div id="tabContentMcp" style="display:none;">
                    <h3 style="margin-top:0;">MCP 服务器</h3>
                    <div class="mcp-header">
                        <span>标识</span><span>命令 (command)</span><span>参数 (可选)</span>
                    </div>
                    <div id="mcpServerList" style="min-height:180px;"></div>
                    <button class="btn-sm" onclick="addMcpRow()" style="margin-top:6px;width:100%;">+ 添加 MCP 服务器</button>
                    <div style="font-size:11px;color:var(--text-muted);margin-top:8px;">
                        相对路径相对于应用所在目录。修改后需重启应用生效。
                    </div>
                </div>
                <!-- Appearance Tab -->
                <div id="tabContentAppearance" style="display:none;">
                    <h3 style="margin-top:0;">外观</h3>
                    <label>主题配色</label>
                    <div style="display:flex;gap:10px;margin-top:6px;">
                        <div class="theme-chip" data-theme="light" onclick="applyTheme('light')" style="background:#f8f8f7;border:2px solid #d4d2ce;" title="亮色"></div>
                        <div class="theme-chip active" data-theme="dark" onclick="applyTheme('dark')" style="background:#0F141B;border:2px solid #A9C7FF;" title="暗色"></div>
                    </div>
                    <div style="font-size:11px;color:var(--text-muted);margin-top:8px;">
                        切换后即时生效，偏好自动保存。
                    </div>
                </div>
            </div>
            <!-- Bottom actions (absolute) -->
            <div class="modal-actions" style="position:absolute;bottom:20px;right:20px;left:20px;">
                <div></div>
                <div style="display:flex;gap:8px;">
                    <button class="btn-cancel" onclick="closeSettings()">取消</button>
                    <button class="btn-primary" onclick="saveSettings()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Action modal (delete/rename confirmations) -->
    <div class="modal-overlay" id="actionModal">
        <div class="modal-box" style="width:380px;padding:24px;text-align:center;">
            <h3 id="actionTitle" style="margin-top:0;"></h3>

    <!-- Path-permission modal (dedicated, always on top) -->

            <p id="pathConfirmDesc" style="font-size:13px;color:var(--text-secondary);margin:0 0 10px;">AI 请求访问以下路径（不在白名单内）：</p>
            <div class="ps-script" id="pathConfirmPath" style="word-break:break-all;"></div>

                <input type="checkbox" id="pathConfirmRemember" style="width:14px;height:14px;">
                <span>记住此选择（下次不再询问）</span>
            </label>
            <div class="modal-actions" style="justify-content:flex-end;gap:8px;margin-top:18px;">
                <button class="btn-cancel" id="pathConfirmDeny">拒绝</button>
                <button class="btn-primary" id="pathConfirmAllow">允许</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="psConfirmModal">
        <div class="modal-box">
            <h3 id="confirmTitle">PowerShell 执行确认</h3>
            <p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;" id="confirmDesc">AI 请求执行以下 PowerShell 命令：</p>
            <div class="ps-script" id="psScript"></div>
            <div class="modal-actions" style="justify-content:space-between;">
                <div id="rememberRow" style="display:none;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);">
                    <input type="checkbox" id="rememberCheck" style="width:14px;height:14px;">
                    <label for="rememberCheck">记住此选择</label>
                </div>
                <div style="display:flex;gap:8px;">
                    <button class="btn-cancel" onclick="denyConfirm()">拒绝</button>
                    <button class="btn-primary" onclick="approveConfirm()">允许</button>
                </div>
            </div>
        </div>
    </div>

</body>
